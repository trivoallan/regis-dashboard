name: PR Preview
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Deploy PR Preview
        uses: rossjrw/pr-preview-action@b2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e # v1 (remplacer par le SHA officiel)
        id: pr-preview
        with:
          source-dir: .
          preview-branch: main
          umbrella-dir: incoming
          qr-code: false
          comment: false
          wait-for-pages-deployment: true

      - name: Split branch name
        env:
          BRANCH: "${{ github.head_ref }}"
        id: split
        run: echo "fragment=${BRANCH##*/}" >> $GITHUB_OUTPUT

      - name: Create comment
        uses: peter-evans/create-or-update-comment@b3b3b3b3b3b3b3b3b3b3b3b3b3b3b3b3b3b3b3b # v5 (remplacer par le SHA officiel)
        with:
          issue-number: "${{ github.event.pull_request.number }}"
          body: |
            Browse the [RegiS Report](https://trivoallan.github.io/regis/dashboard/report/?url=${{ steps.pr-preview.outputs.preview-url }}${{ steps.split.outputs.fragment }}/report.json)

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup PR Preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: .
          preview-branch: main
          umbrella-dir: incoming
          action: remove
