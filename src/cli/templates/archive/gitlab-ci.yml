stages:
  - build
  - deploy

variables:
  PNPM_VERSION: latest

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"

build:
  stage: build
  image: node:20-alpine
  before_script:
    - npm install -g pnpm@$PNPM_VERSION
    - pnpm install --frozen-lockfile
  script:
    # Derive baseUrl from CI_PAGES_URL so subgroups and custom domains are handled correctly.
    # Override by setting ARCHIVE_BASE_URL as a CI/CD variable in project settings.
    - DERIVED_BASE_URL=$(node -e "const p=new URL(process.env.CI_PAGES_URL).pathname.replace(/\\/?$/,'/'); console.log(p)")
    - ARCHIVE_URL="${ARCHIVE_URL:-$CI_PAGES_URL}" ARCHIVE_BASE_URL="${ARCHIVE_BASE_URL:-$DERIVED_BASE_URL}" pnpm build
    - mv build public
  artifacts:
    paths:
      - public/
  rules:
    - changes:
        - static/archive/**/*
        - src/**/*
        - docs/**/*
        - docusaurus.config.ts
        - package.json
    - if: $CI_PIPELINE_SOURCE == "web"

pages:
  stage: deploy
  script:
    - echo "Deploying to GitLab Pages"
  pages:
    publish: public
  artifacts:
    paths:
      - public/
  needs:
    - build
